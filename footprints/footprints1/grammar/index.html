<!DOCtYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grammar</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <!-- The header section -->
    <header>
      <div class="main-title">
        <h1>Footprints 1</h1>
      </div>
      <div class="select-box">
        <select id="unit-selection"></select>
        <select id="topic-selection"></select>
      </div>
    </header>

    <!-- The game container -->
    <main class="container">
      <!-- Team 1 -->
      <section class="team" id="team1">
        <div class="team-header">
          <input type="text" class="team-name" id="teamName1" value="Team-1"></input>
          <div class="score">Score: <span id="score1">0</span></div>
        </div>      
        <div class="check-panel">
          <img class="check-btn" id="correctBtn1" src="../assets/app-images/correct-btn.png">
          <img class="done-btn" src="../assets/app-images/done-btn.png">
          <img class="check-btn" id="wrongBtn1" src="../assets/app-images/incorrect-btn.png">
        </div>      
        <div class="dropzone" id="dropzone1"></div> <!-- The drop zone -->
        <div class="letter-panel" id="letterPanel1"></div> <!-- The letter panel -->
      </section>
      
      <!-- Team 2 -->
      <section class="team" id="team2">
        <div class="team-header">
          <input type="text" class="team-name" id="teamName2" value="Team-2"></input>
          <div class="score">Score: <span id="score2">0</span></div>
        </div>      
        <div class="check-panel">
          <img class="check-btn" id="correctBtn2" src="../assets/app-images/correct-btn.png">
          <img class="done-btn" src="../assets/app-images/done-btn.png">
          <img class="check-btn" id="wrongBtn2" src="../assets/app-images/incorrect-btn.png">
        </div>      
        <div class="dropzone" id="dropzone2"></div> <!-- The drop zone -->
        <div class="letter-panel" id="letterPanel2"></div> <!-- The letter panel -->
      </section>
    </main>

    <!-- The summary panel -->
    <div class="summary-panel">
      <h2>Winners</h2>
      <div id="summaryAnimation"></div>
      <div class="summary-team" id="summaryTeam"></div>
    </div>

    <!-- Javascript section -->
    <script type="module" src="script.js"></script>

  </body>
</html>
